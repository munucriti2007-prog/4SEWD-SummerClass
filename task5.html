<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <h1>User Registration</h1>
    <form>
    <h2>Personal Details</h2>
    <div class="form-group">
        <label>First name:</label>
        <input type="text"></input>
    </div>
    <div class="form-group">
        <label>Last name:</label>
        <input type="text" >
    </div>
    <div class="form-group">
        <label>age</label>
        <input type="number">
    </div>
    <div class="form-group">
        <label>Gender:</label>
        <select>
            <option selected>male</option>
            <option>female</option>
            <option>other</option>
        </select>
    </div>

    <div  class="button-group">
        <label>Profile picture:</label>

        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email">
        </div>
        <div class="radio-group">
            <label> Role: </label>
            <input type="radio"><label>Admin</label>
            <input type="radio"><label>User</label>
        </div>
    </div>
    <div class="checkbox-group">
        <input type="checkbox"><label> I accept all the terms and conditions</label>
    </div>
    <div>
        <button>Register</button>
        <button>Reset</button>
    </div>
